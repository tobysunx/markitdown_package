name: Build Windows EXE

on:
  push:
    branches: [ "main" ] # 当你把代码推送到 main 分支时触发
  workflow_dispatch:      # 允许你手动点击按钮触发

jobs:
  build:
    runs-on: windows-latest # 关键：使用 Windows 虚拟机

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 建议使用 3.10，稳定性好

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 使用 Nuitka 编译
      run: |
        python -m nuitka `
          --standalone `
          --onefile `
          --follow-imports `
          --include-package=markitdown `
          --output-filename=markitdown.exe `
          cli_wrapper.py

    - name: 上传成品
      uses: actions/upload-artifact@v4
      with:
        name: MarkItDown-Windows-EXE
        path: markitdown.exe