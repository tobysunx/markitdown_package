name: Build Windows EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        # 安装 markitdown, nuitka 和压缩插件 zstandard
        pip install markitdown nuitka zstandard

    - name: 使用 Nuitka 编译
      run: |
        python -m nuitka `
          --standalone `
          --onefile `
          --follow-imports `
          --include-package=markitdown `
          --assume-yes-for-downloads `
          --output-filename=markitdown.exe `
          cli_wrapper.py

    - name: 上传成品
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: MarkItDown-Windows-EXE
        path: markitdown.exe